{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>
</head>
<body>
<div class="login-box">
    <h2>User Login</h2>

    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }}">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Enter your Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <p>
        Don't have an account?
        <a href="{% url 'register' %}">Register here</a>
    </p>
</div>
</body>
</html>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    min-height: 100vh;
    position: relative;
    background-color: #1f2937;
    width: 100%;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image: url("{% static 'kk.jpg' %}");
    background-size: cover;
    background-position: center;
    opacity: 0.5;
    z-index: -2;
}

body::after {
    content: "";
    position: fixed;
    inset: 0;
    background: linear-gradient(135deg, rgba(15, 23, 42, 0.35), rgba(30, 41, 59, 0.25));
    z-index: -1;
}

.login-box {
    background: rgba(255, 255, 255, 0.96);
    width: min(92vw, 380px);
    padding: 40px 30px;
    border-radius: 14px;
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
    opacity: 0.5;
}

.login-box h2 {
    text-align: center;
    margin-bottom: 20px;
    color: #1f2937;
}

.login-box input {
    width: 100%;
    padding: 14px;
    margin-bottom: 15px;
    border: 1px solid #cbd5e1;
    border-radius: 10px;
    font-size: 14px;
}

.login-box input:focus {
    outline: none;
    border-color: #0ea5e9;
}

.login-box button {
    width: 100%;
    padding: 12px;
    background: #0284c7;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
}

.login-box button:hover {
    background: #0369a1;
}

.login-box p {
    text-align: center;
    margin-top: 15px;
    font-size: 14px;
}

.login-box a {
    color: #0369a1;
    text-decoration: none;
}

.login-box a:hover {
    text-decoration: underline;
}

.alert {
    font-size: 13px;
    margin-bottom: 10px;
    padding: 8px;
    border-radius: 6px;
    background: #fef3c7;
    color: #92400e;
}
</style>
