services:
  - type: web
    name: hostel-management-system
    env: python
    plan: free
    buildCommand: bash hostel_management_system/build.sh
    startCommand: gunicorn hostel_management_system.wsgi:application
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "2"
